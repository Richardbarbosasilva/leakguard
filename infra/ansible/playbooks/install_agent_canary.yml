---
- name: Build and install Leakguard Agent on the canary host
  hosts: HOST-TEST2
  gather_facts: false
  ignore_unreachable: true
  vars_files:
    - ../group_vars/sharex_pilot.yml

  pre_tasks:
    - name: Resolve API bearer token from supported Semaphore variable names
      ansible.builtin.set_fact:
        resolved_agent_api_bearer_token: >-
          {{
            (
              leakguard_agent_api_bearer_token
              | default(vars['Service token api'], true)
              | default(vars['service_token_api'], true)
              | default(lookup('ansible.builtin.env', 'LEAKGUARD_AGENT_API_BEARER_TOKEN'), true)
              | default('')
            ) | trim
          }}
      no_log: true

    - name: Check WinRM connectivity before canary agent rollout
      ansible.windows.win_ping:
      register: winrm_ping_result
      ignore_unreachable: true
      ignore_errors: true

    - name: Show canary connectivity failure summary
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Target: {{ ansible_host }}"
          - "Connection: {{ ansible_connection | default('n/a') }}"
          - "Transport: {{ ansible_winrm_transport | default('n/a') }}"
          - "User: {{ ansible_user | default('n/a') }}"
          - "Status: FALHOU"
          - >-
            Detalhe: {{
              winrm_ping_result.msg
              | default('host offline ou sem conectividade WinRM no momento')
            }}
      when: winrm_ping_result.ping | default('') != 'pong'

    - name: Stop canary agent rollout on unreachable host
      ansible.builtin.meta: end_host
      when: winrm_ping_result.ping | default('') != 'pong'

    - name: Require API bearer token for automated canary rollout
      ansible.builtin.assert:
        that:
          - (resolved_agent_api_bearer_token | length) > 0
        fail_msg: >-
          Defina o token como secret/extra var no Semaphore usando de preferencia
          a chave leakguard_agent_api_bearer_token. Alias aceitos: "Service token api",
          service_token_api ou a env LEAKGUARD_AGENT_API_BEARER_TOKEN.

    - name: Load base agent config from the controller
      ansible.builtin.set_fact:
        agent_config_base: "{{ lookup('file', agent_config_local_path) | from_json }}"
      no_log: true

    - name: Build rendered agent config for the canary host
      ansible.builtin.set_fact:
        agent_config_rendered: >-
          {{
            agent_config_base
            | combine(
                {
                  "api": {
                    "enabled": true,
                    "base_url": agent_api_base_url,
                    "heartbeat_path": "/api/v1/agents/heartbeat",
                    "ingest_confirm_path": "/api/v1/ingest/confirm",
                    "bearer_token": resolved_agent_api_bearer_token,
                    "agent_id": inventory_hostname
                  }
                },
                recursive=True
              )
          }}
      no_log: true

    - name: Create temporary rendered config path on the controller
      ansible.builtin.tempfile:
        state: file
        suffix: ".json"
      delegate_to: localhost
      register: rendered_agent_config_local_file

    - name: Render per-host canary config on the controller
      ansible.builtin.template:
        src: "{{ agent_config_template_local_path }}"
        dest: "{{ rendered_agent_config_local_file.path }}"
        mode: "0600"
      delegate_to: localhost
      no_log: true

  tasks:
    - name: Ensure agent directories exist
      ansible.windows.win_file:
        path: "{{ item }}"
        state: directory
      loop:
        - "{{ agent_install_root }}"
        - "{{ agent_programdata_root }}"
        - "{{ agent_programdata_root }}\\assets"
        - "{{ agent_programdata_root }}\\logs"
        - "{{ agent_programdata_root }}\\spool"
        - "{{ agent_programdata_root }}\\tmp"
        - "{{ agent_programdata_root }}\\data"
        - "{{ agent_build_workspace_remote }}"
        - "{{ agent_build_source_remote_dir }}"

    - name: Pin storage hostnames in the canary hosts file
      ansible.windows.win_powershell:
        script: |
          $hostsPath = "$env:SystemRoot\System32\drivers\etc\hosts"
          $existing = @()
          if (Test-Path $hostsPath) {
            $existing = Get-Content $hostsPath
          }

          $mappings = @(
            @{ Host = "{{ agent_storage_host_alias }}"; IP = "{{ agent_storage_host_ip }}" },
            @{ Host = "{{ agent_console_host_alias }}"; IP = "{{ agent_console_host_ip }}" },
            @{ Host = "{{ agent_api_host_alias }}"; IP = "{{ agent_api_host_ip }}" }
          )

          $updated = @()
          foreach ($line in $existing) {
            $skip = $false
            foreach ($mapping in $mappings) {
              $escaped = [regex]::Escape($mapping.Host)
              if ($line -match "^\s*[0-9\.:]+\s+$escaped(\s|$)") {
                $skip = $true
                break
              }
            }
            if (-not $skip) {
              $updated += $line
            }
          }

          foreach ($mapping in $mappings) {
            $updated += "$($mapping.IP)`t$($mapping.Host)"
          }

          Set-Content -Path $hostsPath -Value $updated -Encoding ASCII
          $updated | Where-Object { $_ -match "homelab\.local" }
      register: hosts_pin

    - name: Validate MinIO S3 endpoint from the canary host
      ansible.windows.win_powershell:
        script: |
          $response = Invoke-WebRequest -Uri "http://{{ agent_storage_host_alias }}/minio/health/live" -UseBasicParsing -TimeoutSec 10
          if ($response.StatusCode -ne 200) {
            throw "Endpoint S3 retornou status $($response.StatusCode)"
          }
          "S3 endpoint OK: $($response.StatusCode)"
      register: storage_health

    - name: Validate Audit ShareX API endpoint from the canary host
      ansible.windows.win_powershell:
        script: |
          $response = Invoke-WebRequest -Uri "http://{{ agent_api_host_alias }}:{{ agent_api_port }}/health" -UseBasicParsing -TimeoutSec 10
          if ($response.StatusCode -ne 200) {
            throw "API retornou status $($response.StatusCode)"
          }
          "Audit API endpoint OK: $($response.StatusCode)"
      register: api_health

    - name: Copy agent source code
      ansible.windows.win_copy:
        src: "{{ agent_source_local_path }}"
        dest: "{{ agent_build_script_remote_path }}"

    - name: Copy agent requirements
      ansible.windows.win_copy:
        src: "{{ agent_requirements_local_path }}"
        dest: "{{ agent_build_requirements_remote_path }}"

    - name: Detect Python interpreter for remote build
      ansible.windows.win_powershell:
        script: |
          $python = $null
          $commands = Get-Command python,py -ErrorAction SilentlyContinue | Where-Object { $_.Source }

          foreach ($command in $commands) {
            if ($command.Name -ieq "python.exe") {
              $python = $command.Source
              break
            }
          }

          if (-not $python -and $commands) {
            $python = $commands[0].Source
          }

          if (-not $python) {
            throw "Python nao encontrado no host canario."
          }

          $python
      register: python_path

    - name: Stop existing agent service before refreshing the binary on the canary host
      ansible.windows.win_service:
        name: "{{ agent_service_name }}"
        state: stopped
      ignore_errors: true

    - name: Build Leakguard Agent executable on the canary host
      ansible.windows.win_powershell:
        script: |
          $python = "{{ python_path.output[0] }}"
          $workspace = "{{ agent_build_workspace_remote }}"
          $sourceDir = "{{ agent_build_source_remote_dir }}"
          $venvPython = Join-Path $workspace ".venv\\Scripts\\python.exe"
          $distBinary = "{{ agent_built_binary_remote_path }}"

          if (-not (Test-Path $venvPython)) {
            & $python -m venv (Join-Path $workspace ".venv")
            if ($LASTEXITCODE -ne 0) {
              throw "Falha ao criar o venv do agent."
            }
          }

          & $venvPython -m pip install --upgrade pip
          if ($LASTEXITCODE -ne 0) {
            throw "Falha ao atualizar o pip do agent."
          }

          & $venvPython -m pip install -r "{{ agent_build_requirements_remote_path }}" pyinstaller
          if ($LASTEXITCODE -ne 0) {
            throw "Falha ao instalar dependencias do agent."
          }

          Push-Location $sourceDir
          try {
            & $venvPython -m PyInstaller --noconfirm --clean --onefile --name ScreenshotAuditAgent `
              --distpath "{{ agent_build_workspace_remote }}\\dist" `
              --workpath "{{ agent_build_workspace_remote }}\\build" `
              --specpath "{{ agent_build_workspace_remote }}\\spec" `
              "{{ agent_build_script_remote_path }}"
            if ($LASTEXITCODE -ne 0) {
              throw "PyInstaller retornou erro ao gerar o executavel."
            }
          } finally {
            Pop-Location
          }

          if (-not (Test-Path $distBinary)) {
            throw "Executavel nao encontrado em $distBinary"
          }

          $distBinary
      register: agent_build

    - name: Copy built agent binary into the install root
      ansible.windows.win_powershell:
        script: |
          Copy-Item -Path "{{ agent_built_binary_remote_path }}" -Destination "{{ agent_binary_remote_path }}" -Force
          Get-Item "{{ agent_binary_remote_path }}" | Select-Object FullName,Length,LastWriteTime | ConvertTo-Json -Compress
      register: copied_binary

    - name: Ensure local dist directory exists
      ansible.builtin.file:
        path: "{{ agent_build_fetch_cache_local_path | dirname }}"
        state: directory
      delegate_to: localhost

    - name: Fetch canary-built binary back to the controller
      ansible.builtin.fetch:
        src: "{{ agent_built_binary_remote_path }}"
        dest: "{{ agent_build_fetch_cache_local_path }}"
        flat: true

    - name: Copy rendered agent config
      ansible.windows.win_copy:
        src: "{{ rendered_agent_config_local_file.path }}"
        dest: "{{ agent_config_remote_path }}"
      no_log: true

    - name: Copy agent logo
      ansible.windows.win_copy:
        src: "{{ agent_logo_local_path }}"
        dest: "{{ agent_logo_remote_path }}"

    - name: Copy NSSM
      ansible.windows.win_copy:
        src: "{{ nssm_local_path }}"
        dest: "{{ agent_nssm_remote_path }}"

    - name: Copy service installer script
      ansible.windows.win_copy:
        src: "{{ install_agent_service_local_path }}"
        dest: "{{ agent_install_script_remote_path }}"

    - name: Install or update Leakguard Agent service
      ansible.windows.win_powershell:
        script: |
          powershell.exe -ExecutionPolicy Bypass -File "{{ agent_install_script_remote_path }}" `
            -ServiceName "{{ agent_service_name }}" `
            -BinaryPath "{{ agent_binary_remote_path }}" `
            -ConfigPath "{{ agent_config_remote_path }}" `
            -NssmPath "{{ agent_nssm_remote_path }}" `
            -ProgramDataRoot "{{ agent_programdata_root }}"
      register: agent_install

    - name: Show agent installation result
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Connection: {{ ansible_connection | default('n/a') }}"
          - "Transport: {{ ansible_winrm_transport | default('n/a') }}"
          - "User: {{ ansible_user | default('n/a') }}"
          - "Service: {{ agent_service_name }}"
          - "Hosts file pinned: {{ hosts_pin.output | default([]) }}"
          - "Storage health: {{ storage_health.output | default([]) }}"
          - "API health: {{ api_health.output | default([]) }}"
          - "Python: {{ python_path.output | default([]) }}"
          - "Build artifact: {{ agent_build.output | default([]) }}"
          - "Binary metadata: {{ copied_binary.output | default([]) }}"
          - "Changed/Executed: {{ agent_install.changed }}"
          - "{{ agent_install.output | default([]) }}"

  post_tasks:
    - name: Remove temporary rendered config from the controller
      ansible.builtin.file:
        path: "{{ rendered_agent_config_local_file.path }}"
        state: absent
      delegate_to: localhost
      when: rendered_agent_config_local_file.path is defined
