---
- name: Configure ShareX to use the managed spool path
  hosts: sharex_pilot
  gather_facts: false
  ignore_unreachable: true
  vars_files:
    - ../group_vars/sharex_pilot.yml

  tasks:
    - name: Ensure managed spool directories exist
      ansible.windows.win_file:
        path: "{{ item }}"
        state: directory
      loop:
        - "{{ sharex_personal_path }}"
        - "{{ sharex_personal_path }}\\Screenshots"
        - "{{ agent_programdata_root }}"
        - "{{ agent_programdata_root }}\\logs"

    - name: Detect ShareX executable path
      ansible.windows.win_powershell:
        script: |
          $paths = @(
            'C:\Program Files\ShareX\ShareX.exe',
            'C:\Program Files (x86)\ShareX\ShareX.exe',
            "$env:LOCALAPPDATA\Programs\ShareX\ShareX.exe"
          )
          $found = $paths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $found) {
            throw "ShareX.exe nao encontrado no host."
          }
          @{
            path = $found
            startupShortcut = Join-Path $env:ProgramData 'Microsoft\Windows\Start Menu\Programs\Startup\ShareX.lnk'
          } | ConvertTo-Json -Compress
      register: sharex_path_raw

    - name: Parse ShareX executable path
      ansible.builtin.set_fact:
        sharex_path_info: "{{ sharex_path_raw.output[0] | from_json }}"

    - name: Apply ShareX machine-wide registry policy
      ansible.windows.win_regedit:
        path: HKLM:\SOFTWARE\ShareX
        name: "{{ item.name }}"
        data: "{{ item.data }}"
        type: "{{ item.type }}"
        state: present
      loop:
        - { name: "PersonalPath", data: "{{ sharex_personal_path }}", type: "string" }
        - { name: "DisableUpload", data: 1, type: "dword" }
        - { name: "DisableUpdateCheck", data: 1, type: "dword" }

    - name: Configure ShareX autostart and clean stale Lightshot startup entries
      ansible.windows.win_powershell:
        script: |
          $sharexExe = "{{ sharex_path_info.path }}"
          $startupShortcut = "{{ sharex_path_info.startupShortcut }}"
          $startupDir = Split-Path $startupShortcut -Parent
          New-Item -ItemType Directory -Path $startupDir -Force | Out-Null

          $wshShell = New-Object -ComObject WScript.Shell
          $shortcut = $wshShell.CreateShortcut($startupShortcut)
          $shortcut.TargetPath = $sharexExe
          $shortcut.WorkingDirectory = Split-Path $sharexExe -Parent
          $shortcut.IconLocation = "$sharexExe,0"
          $shortcut.Save()

          $lightshotNames = @('Lightshot', 'LightShot')
          $runKeys = @(
            'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Run',
            'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Run'
          )

          foreach ($sid in (Get-ChildItem Registry::HKEY_USERS -ErrorAction SilentlyContinue | Select-Object -ExpandProperty PSChildName)) {
            if ($sid -match '^S-\d-\d+-.+') {
              $runKeys += "Registry::HKEY_USERS\\$sid\\Software\\Microsoft\\Windows\\CurrentVersion\\Run"
            }
          }

          foreach ($runKey in $runKeys | Select-Object -Unique) {
            foreach ($name in $lightshotNames) {
              Remove-ItemProperty -Path $runKey -Name $name -ErrorAction SilentlyContinue
            }
          }

          $lightshotShortcut = Join-Path $startupDir 'Lightshot.lnk'
          if (Test-Path $lightshotShortcut) {
            Remove-Item $lightshotShortcut -Force
          }

          @{
            sharexExe = $sharexExe
            startupShortcut = $startupShortcut
            lightshotShortcutRemoved = (-not (Test-Path $lightshotShortcut))
          } | ConvertTo-Json -Compress
      register: sharex_startup

    - name: Stop ShareX to reload configuration on next launch
      ansible.windows.win_powershell:
        script: |
          $process = Get-Process -Name ShareX -ErrorAction SilentlyContinue
          if ($process) {
            $process | Stop-Process -Force
            Write-Output "ShareX process stopped"
          } else {
            Write-Output "ShareX process not running"
          }
      register: sharex_process

    - name: Show ShareX spool configuration summary
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Managed PersonalPath: {{ sharex_personal_path }}"
          - "ShareX executable: {{ sharex_path_info.path }}"
          - "Startup/autostart: {{ sharex_startup.output | default([]) }}"
          - "Upload disabled: True"
          - "Update check disabled: True"
          - "{{ sharex_process.output | default([]) }}"
