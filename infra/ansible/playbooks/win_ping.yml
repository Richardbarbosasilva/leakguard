---
- name: Validate WinRM connectivity on pilot hosts
  hosts: sharex_pilot
  gather_facts: false

  tasks:
    - name: Ping Windows host through WinRM
      ansible.windows.win_ping:
      register: winrm_ping_result
      ignore_unreachable: true
      ignore_errors: true

    - name: Show host connectivity summary
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Target: {{ ansible_host }}"
          - "Connection: {{ ansible_connection | default('n/a') }}"
          - "Transport: {{ ansible_winrm_transport | default('n/a') }}"
          - "User: {{ ansible_user | default('n/a') }}"
          - "Status: {{ 'OK' if winrm_ping_result.ping | default('') == 'pong' else 'FALHOU' }}"
          - >-
            Detalhe: {{
              'WinRM respondeu normalmente'
              if winrm_ping_result.ping | default('') == 'pong'
              else (winrm_ping_result.msg | default('falha sem mensagem detalhada'))
            }}
